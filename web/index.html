<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI Agent Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1> Retroperitoneal Tumor Resection Agent</h1>
            <span class="status-indicator" aria-label="在线状态">Online</span>
        </header>
        

        <main class="chat-box" id="chat-box" role="log" aria-live="polite" aria-label="Chat message area">
        </main>
        <footer class="input-area">
            <div class="input-wrapper">
                <!-- 上传文件按钮 -->
                <input type="file" id="file-input" style="display: none;" onchange="uploadFile()">
                
                <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                    📎
                </button>

                <input 
                    type="text" 
                    id="user-input" 
                    class="user-input" 
                    placeholder="Enter message..." 
                    aria-label="您的消息"
                    autofocus
                    onkeydown="handleKey(event)"
                >

                <button id="send-btn" class="send-btn" aria-label="发送" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <p class="input-hint">Press Enter to send, Shift+Enter for a new line</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
